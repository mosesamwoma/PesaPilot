# docker-compose.yml
version: '3.8'

services:
  pesapilot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pesapilot
    ports:
      - "8501:8501"
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-1000}
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-False}
      - WHATSAPP_MAIN_NUMBER=${WHATSAPP_MAIN_NUMBER}
      - WHATSAPP_LID=${WHATSAPP_LID}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-http://localhost:8000}
      - WHATSAPP_API_PORT=${WHATSAPP_API_PORT:-8000}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"